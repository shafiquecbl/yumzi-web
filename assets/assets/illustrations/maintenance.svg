<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" role="img" aria-label="Maintenance illustration: a person fixing a large gear with a wrench">
  <!-- Ground line -->
  <line x1="40" y1="450" x2="560" y2="450" stroke="#3f3d56" stroke-width="3" stroke-linecap="round"/>

  <!-- Decorative dots -->
  <circle cx="80"  cy="120" r="5"  fill="#FF6200" opacity="0.45"/>
  <circle cx="520" cy="80"  r="6"  fill="#FF6200" opacity="0.35"/>
  <circle cx="540" cy="220" r="4"  fill="#FF6200" opacity="0.55"/>
  <circle cx="60"  cy="260" r="4"  fill="#FF6200" opacity="0.55"/>
  <circle cx="500" cy="380" r="5"  fill="#FF6200" opacity="0.4"/>

  <!-- Big gear (background) -->
  <g transform="translate(380 200)" fill="#FF6200">
    <!-- 12 teeth -->
    <g>
      <rect x="-14" y="-150" width="28" height="42" rx="6"/>
      <rect x="-14" y="108"  width="28" height="42" rx="6"/>
      <rect x="-150" y="-14" width="42" height="28" rx="6"/>
      <rect x="108"  y="-14" width="42" height="28" rx="6"/>
    </g>
    <g transform="rotate(45)">
      <rect x="-14" y="-150" width="28" height="42" rx="6"/>
      <rect x="-14" y="108"  width="28" height="42" rx="6"/>
      <rect x="-150" y="-14" width="42" height="28" rx="6"/>
      <rect x="108"  y="-14" width="42" height="28" rx="6"/>
    </g>
    <circle cx="0" cy="0" r="120"/>
    <circle cx="0" cy="0" r="38" fill="#fff7ed"/>
    <circle cx="0" cy="0" r="20" fill="#3f3d56"/>
  </g>

  <!-- Small gear (background, top-left) -->
  <g transform="translate(140 130)" fill="#3f3d56" opacity="0.85">
    <g>
      <rect x="-7" y="-72" width="14" height="22" rx="4"/>
      <rect x="-7" y="50"  width="14" height="22" rx="4"/>
      <rect x="-72" y="-7" width="22" height="14" rx="4"/>
      <rect x="50"  y="-7" width="22" height="14" rx="4"/>
    </g>
    <g transform="rotate(45)">
      <rect x="-7" y="-72" width="14" height="22" rx="4"/>
      <rect x="-7" y="50"  width="14" height="22" rx="4"/>
      <rect x="-72" y="-7" width="22" height="14" rx="4"/>
      <rect x="50"  y="-7" width="22" height="14" rx="4"/>
    </g>
    <circle cx="0" cy="0" r="55"/>
    <circle cx="0" cy="0" r="14" fill="#fff7ed"/>
  </g>

  <!-- Person -->
  <g>
    <!-- Legs -->
    <rect x="195" y="350" width="22" height="100" rx="8" fill="#3f3d56"/>
    <rect x="223" y="350" width="22" height="100" rx="8" fill="#3f3d56"/>
    <!-- Shoes -->
    <ellipse cx="206" cy="452" rx="18" ry="6" fill="#1f1d2b"/>
    <ellipse cx="234" cy="452" rx="18" ry="6" fill="#1f1d2b"/>
    <!-- Body / shirt -->
    <path d="M178 250 Q220 232 262 250 L268 354 Q220 362 172 354 Z" fill="#FF6200"/>
    <!-- Belt -->
    <rect x="175" y="346" width="92" height="10" rx="3" fill="#1f1d2b"/>
    <!-- Neck -->
    <rect x="212" y="218" width="16" height="22" fill="#f6c5a8"/>
    <!-- Head -->
    <circle cx="220" cy="200" r="32" fill="#f6c5a8"/>
    <!-- Hair / cap -->
    <path d="M188 192 Q188 158 220 156 Q252 158 252 192 Z" fill="#3f3d56"/>
    <path d="M186 192 Q186 188 220 188 Q254 188 254 192 L254 198 L186 198 Z" fill="#3f3d56"/>
    <!-- Eye -->
    <circle cx="232" cy="204" r="2.5" fill="#1f1d2b"/>
    <!-- Smile -->
    <path d="M226 214 Q232 220 238 214" stroke="#1f1d2b" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Arm holding wrench (right arm extends to the gear) -->
    <path d="M260 258 Q310 260 340 200" stroke="#FF6200" stroke-width="22" stroke-linecap="round" fill="none"/>
    <!-- Hand -->
    <circle cx="343" cy="200" r="11" fill="#f6c5a8"/>

    <!-- Left arm hanging -->
    <path d="M180 258 Q170 300 178 340" stroke="#FF6200" stroke-width="22" stroke-linecap="round" fill="none"/>
    <circle cx="178" cy="342" r="10" fill="#f6c5a8"/>
  </g>

  <!-- Wrench -->
  <g transform="translate(338 188) rotate(-30)" fill="#3f3d56">
    <rect x="-6" y="-2" width="60" height="14" rx="4"/>
    <path d="M-6 -2 L-22 -10 L-32 0 L-22 10 L-6 12 Z"/>
    <circle cx="-18" cy="1" r="6" fill="#fff7ed"/>
  </g>

  <!-- Toolbox -->
  <g transform="translate(70 380)">
    <rect x="0" y="20" width="100" height="50" rx="6" fill="#FF6200"/>
    <rect x="0" y="20" width="100" height="10" fill="#1f1d2b" opacity="0.25"/>
    <path d="M22 20 Q22 0 50 0 Q78 0 78 20" stroke="#3f3d56" stroke-width="6" fill="none" stroke-linecap="round"/>
    <rect x="44" y="38" width="12" height="14" rx="2" fill="#3f3d56"/>
  </g>
</svg>
